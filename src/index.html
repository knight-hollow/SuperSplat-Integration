<!DOCTYPE html>
<html>
    <head>
        <title>SuperSplat</title>
        <meta charset="utf-8" />
        <base href="__BASE_HREF__">
        <link rel="manifest" href="./manifest.json">
        <link rel="stylesheet" href="./index.css">
        <link rel="shortcut icon" href="#">
        <meta name="description" content="SuperSplat is an advanced browser-based editor for manipulating and optimizing 3D Gaussian Splats. It is open source and engine agnostic." />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

        <!-- Service worker -->
        <script>
            const sw = navigator.serviceWorker;
            if (sw) {
                const isLocalhost = (
                    location.hostname === 'localhost' ||
                    location.hostname === '127.0.0.1' ||
                    location.hostname === '[::1]'
                );

                // For local development we disable (and unregister) the Service Worker to avoid stale cache.
                // This removes the need for manual "Clear SW / Unregister SW" between rebuilds.
                if (isLocalhost) {
                    const key = 'supersplat_sw_unregistered_once';
                    if (sessionStorage.getItem(key) !== '1') {
                        sessionStorage.setItem(key, '1');
                        sw.getRegistrations()
                            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
                            .then(() => {
                                console.log('service worker unregistered for localhost dev');
                                // Reload once to ensure the current page is no longer controlled by the old SW.
                                location.reload();
                            })
                            .catch((err) => console.log('failed to unregister service worker', err));
                    }
                } else {
                    sw.register('./sw.js')
                        .then(reg => console.log('service worker registered', reg))
                        .catch(err => console.log('failed to register service worker', err));
                }
            }
        </script>
    </head>

    <body>
        <script type="module" src="./index.js"></script>
    </body>
</html>
